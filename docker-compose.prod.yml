# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: shared-redis running (see /srv/redis)

services:
  api:
    build: .
    ports:
      - "8002:8000"  # 8002 to avoid conflict with Ducker on 8000
    volumes:
      - ./output:/app/output
      - job_images:/app/job_images
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://shared-redis:6379
      - OUTPUT_DIR=/app/output
      - JOB_IMAGES_DIR=/app/job_images
      - IMAGE_EXPIRY_MINUTES=${IMAGE_EXPIRY_MINUTES:-30}
      - API_BASE_URL=${API_BASE_URL:-https://bowerbirder.pressive.in}
      - API_ALLOWED_IPS=${API_ALLOWED_IPS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - caddy

  worker:
    build: .
    command: python -m app.worker
    volumes:
      - ./output:/app/output
      - job_images:/app/job_images
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://shared-redis:6379
      - OUTPUT_DIR=/app/output
      - JOB_IMAGES_DIR=/app/job_images
      - IMAGE_EXPIRY_MINUTES=${IMAGE_EXPIRY_MINUTES:-30}
      - API_BASE_URL=${API_BASE_URL:-https://bowerbirder.pressive.in}
      - FAL_KEY=${FAL_KEY}
    restart: unless-stopped
    networks:
      - caddy

volumes:
  job_images:

networks:
  caddy:
    external: true

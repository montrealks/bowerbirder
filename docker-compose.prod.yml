# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: shared-redis running (see /srv/redis)

services:
  api:
    build: .
    # Port intentionally NOT published — Caddy reaches this container over
    # the internal `caddy` docker network (bowerbirder-api-1:8000). A
    # host-published port bypasses the Cloudflare-only origin firewall.
    volumes:
      - ./output:/app/output
      - job_images:/app/job_images
    env_file:
      - /root/.secrets.env
      - .env
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://shared-redis:6379
      - OUTPUT_DIR=/app/output
      - JOB_IMAGES_DIR=/app/job_images
      - API_BASE_URL=https://bowerbirder.pressive.in
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - caddy

  worker:
    build: .
    command: python -m app.worker
    volumes:
      - ./output:/app/output
      - job_images:/app/job_images
    env_file:
      - /root/.secrets.env
      - .env
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://shared-redis:6379
      - OUTPUT_DIR=/app/output
      - JOB_IMAGES_DIR=/app/job_images
      - API_BASE_URL=https://bowerbirder.pressive.in
    restart: unless-stopped
    networks:
      - caddy

volumes:
  job_images:

networks:
  caddy:
    external: true
